kind = "web"
previewPath = "/"
title = "Student Stress Survey"
version = "1.0.0"
id = "artifacts/survey-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22596

[services.development]
run = "pnpm --filter @workspace/survey-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/survey-app", "run", "build" ]
publicDir = "artifacts/survey-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22596"
BASE_PATH = "/"
